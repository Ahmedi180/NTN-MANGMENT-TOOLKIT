<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTN Management Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <h1 class="brand-name">NTN Management</h1>
        <p class="brand-description">Admin Panel</p>
      </div>
      <nav class="menu">
        <a class="menu-item active" href="index.html">Dashboard</a>
        <a class="menu-item" href="ntn-search.html">NTN Search</a>
        <a class="menu-item" href="auto-update.html">NTN Auto Update</a>
        <a class="menu-item" href="lines-update.html">Different Lines NTN Update</a>
      </nav>
    </aside>

    <main class="content">
      <div class="dashboard-page">
        <section class="hero-card">
          <h1>Welcome to NTN Management</h1>
          <p>Manage all NTN records from one centralized dashboard.</p>
        </section>

        <section class="summary-grid">
          <div class="summary-card">
            <span>Total Records</span>
            <strong id="totalRecords">1,248</strong>
          </div>
          <div class="summary-card green-card">
            <span>Active NTN</span>
            <strong id="activeNTN">1,080</strong>
          </div>
          <div class="summary-card red-card">
            <span>Expired NTN</span>
            <strong id="expiredNTN">168</strong>
          </div>
          <div class="summary-card blue-card">
            <span>Updated Today</span>
            <strong id="updatedToday">320</strong>
          </div>
        </section>

        <section class="recent-updates">
          <h2>Recent Activity</h2>
          <div id="recentUpdates">No updates yet.</div>
        </section>
      </div>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
